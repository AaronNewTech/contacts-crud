<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>{% block title %}Contacts CRUD{% endblock title %}</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/home.css' %}" />
    <!-- Expose CSRF token explicitly for JS fetch helpers -->
    <meta name="csrf-token" content="{{ csrf_token }}" />
  </head>
  <body>
    <!-- CSRF token now provided in a meta tag in <head> for JS to read -->
    <!-- confirm modal (custom) -->
    <div id="confirm-modal" role="dialog" aria-modal="true">
      <div class="confirm-dialog">
        <p id="confirm-modal-msg" class="confirm-msg"></p>
        <div class="confirm-actions">
          <button id="confirm-modal-cancel" class="confirm-cancel">
            Cancel
          </button>
          <button id="confirm-modal-confirm" class="confirm-confirm">
            Delete
          </button>
        </div>
      </div>
    </div>
    <div id="app-banner" aria-live="polite">
      <span id="app-banner-msg"></span>
      <button
        id="app-banner-close"
        aria-label="Dismiss"
        class="app-banner-close"
      >
        ✕
      </button>
    </div>

    <!-- Top navigation: Contacts and Events list views -->
    <nav id="main-nav" class="main-nav">
      <a href="#" id="nav-contacts" class="nav-link active" data-view="contacts"
        >Contacts</a
      >
      <a href="#" id="nav-calendar" class="nav-link" data-view="calendar"
        >Calendar</a
      >
    </nav>

    <div class="layout">
      <div id="contact-list">
        <div class="header">
          <h1>Contacts</h1>

          <a id="create-contact" href="#" title="Add contact">
            <img src="{% static 'images/Group 1.png' %}" alt="Add contact" />
          </a>
        </div>
        <ul>
          {% for c in contacts %}
          <li>
            <div
              class="contact-item"
              data-pk="{{ c.pk }}"
              data-first="{{ c.first_name }}"
              data-last="{{ c.last_name }}"
              role="button"
              tabindex="0"
              aria-pressed="false"
            >
              {{ c.first_name }} {{ c.last_name }}
            </div>
          </li>
          {% empty %}
          <li>No contacts</li>
          {% endfor %}
        </ul>
      </div>

      <div id="contact-detail">
        <!-- detail will be loaded here -->
      </div>
    </div>

    
<script src="{% static 'js/home.js' %}" defer></script>


  </body>
</html>
