<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>{% block title %}Contacts CRUD{% endblock title %}</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/home.css' %}" />
  </head>
  <body>
    <form style="display: none">{% csrf_token %}</form>
    <div
      id="app-banner"
      aria-live="polite"
      style="
        display: none;
        position: fixed;
        top: 16px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 1000;
        padding: 10px 16px;
        border-radius: 6px;
        box-shadow: 0 6px 18px rgba(0, 0, 0, 0.12);
        font-weight: 600;
        color: #03306b;
        max-width: 90%;
      "
    >
      <span id="app-banner-msg"></span>
      <button
        id="app-banner-close"
        aria-label="Dismiss"
        style="
          background: transparent;
          border: 0;
          margin-left: 12px;
          cursor: pointer;
          font-weight: 700;
        "
      >
        ✕
      </button>
    </div>
    <!-- confirm modal (custom) -->
    <div
      id="confirm-modal"
      role="dialog"
      aria-modal="true"
      style="
        display: none;
        position: fixed;
        inset: 0;
        align-items: center;
        justify-content: center;
        z-index: 1100;
      "
    >
      <div
        style="
          background: #fff;
          padding: 16px;
          border-radius: 8px;
          box-shadow: 0 8px 30px rgba(0, 0, 0, 0.15);
          max-width: 420px;
          margin: 16px;
        "
      >
        <p
          id="confirm-modal-msg"
          style="margin: 0 0 12px; color: #082038; font-weight: 600"
        ></p>
        <div style="text-align: right">
          <button
            id="confirm-modal-cancel"
            style="
              margin-right: 8px;
              padding: 8px 12px;
              border-radius: 6px;
              border: 1px solid #d1d5db;
              background: #fff;
              cursor: pointer;
            "
          >
            Cancel
          </button>
          <button
            id="confirm-modal-confirm"
            style="
              padding: 8px 12px;
              border-radius: 6px;
              border: 0;
              background: #e74c3c;
              color: #fff;
              cursor: pointer;
            "
          >
            Delete
          </button>
        </div>
      </div>
    </div>
    <div class="layout">
      <div id="contact-list">
        <div class="header">
          <h1>Contacts</h1>

          <a id="create-contact" href="#" title="Add contact">
            <img src="{% static 'images/Group 1.png' %}" alt="Add contact" />
          </a>
        </div>
        <ul>
          {% for c in contacts %}
          <li>
            <div
              class="contact-item"
              data-pk="{{ c.pk }}"
              role="button"
              tabindex="0"
              aria-pressed="false"
            >
              {{ c.first_name }} {{ c.last_name }}
            </div>
          </li>
          {% empty %}
          <li>No contacts</li>
          {% endfor %}
        </ul>
      </div>

      <div id="contact-detail">
        <!-- detail will be loaded here -->
      </div>
    </div>

    <script>
      // helper to read cookies (used for CSRF token)
      function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
          const cookies = document.cookie.split(';');
          for (let i = 0; i < cookies.length; i++) {
            const cookie = cookies[i].trim();
            if (cookie.substring(0, name.length + 1) === name + '=') {
              cookieValue = decodeURIComponent(
                cookie.substring(name.length + 1),
              );
              break;
            }
          }
        }
        return cookieValue;
      }
      // Render detail HTML from a data object (used for server-fetched and local-new contacts)
      function renderDetail(data) {
        const detailEl = document.getElementById('contact-detail');
        let html = `
            <div class="contact-detail">
              <form id="contact-form">
                <h2>
                  <input  id="first-name" name="first_name" value="${data.first_name || ''}" placeholder="First name" />
                  <input id="last-name" name="last_name" value="${data.last_name || ''}" placeholder="Last name" />
                </h2>
                
                <h3>Contact methods</h3>
                <div id="methods">
              `;

        if (data.contact_methods && data.contact_methods.length) {
          data.contact_methods.forEach((m, idx) => {
            html +=
              `<div class="method-row" data-idx="${idx}">` +
              `<select name="method_type_${idx}">` +
              `<option value="email" ${m.type === 'email' ? 'selected' : ''}>Email</option>` +
              `<option value="phone" ${m.type === 'phone' ? 'selected' : ''}>Phone</option>` +
              `<option value="social" ${m.type === 'social' ? 'selected' : ''}>Social</option>` +
              `</select>` +
              `<input name="method_value_${idx}" value="${m.value || ''}" />` +
              `${m.id ? `<a href="#" class="delete-method" data-method-id="${m.id}" aria-label="Remove method"><img src="{% static 'images/Group 3.png' %}" alt="Remove" /></a>` : `<a href="#" class="delete-method" aria-label="Remove method"><img src="{% static 'images/Group 3.png' %}" alt="Remove" /></a>`}` +
              `</div>`;
          });
        } else {
          html +=
            `<div class="method-row" data-idx="0">` +
            `<select name="method_type_0">` +
            `<option value="email">Email</option>` +
            `<option value="phone">Phone</option>` +
            `<option value="social">Social</option>` +
            `</select>` +
            `<input name="method_value_0" value="" />` +
            `<a href="#" class="delete-method" aria-label="Remove method"><img src="{% static 'images/Group 3.png' %}" alt="Remove" /></a>` +
            `</div>`;
        }

        html += `</div>
                <div class="method-controls" style="margin-top: .75rem">
                  <a id="add-method" href="#" role="button" class="image-button" aria-label="Add method" style="color: #579AFF; text-decoration: none;">
                    <img src="{% static 'images/Group 2.png' %}" alt="Add method" style="margin-right: 8px;" />add method
                  </a>
                </div>
                <div class="bottom-controls" style="margin-top: 1rem">
                    <a id="delete-contact" href="#" role="button" class="image-button" aria-label="Delete contact">
                    <img src="{% static 'images/Component 3.png' %}" alt="Delete contact" />
                  </a>
                  <a id="cancel-contact" href="#" role="button" class="image-button" aria-label="Cancel contact">
                    <img src="{% static 'images/Component 2.png' %}" alt="Cancel contact" />
                  </a>
                  <a id="save-contact" href="#" role="button" class="image-button" aria-label="Save contact">
                    <img src="{% static 'images/Component 1.png' %}" alt="Save contact" />
                  </a>
                </div>
              </form>`;
        detailEl.innerHTML = html;
      }

      // Attach click handlers to load contact JSON and render it client-side
      async function loadDetail(pk) {
        const detailEl = document.getElementById('contact-detail');
        try {
          const res = await fetch(`/contacts/api/${pk}/`);
          if (!res.ok) throw new Error('Network response was not ok');
          const data = await res.json();
          renderDetail(data);
          return data;
        } catch (err) {
          detailEl.innerHTML = '<p>Error loading contact.</p>';
          console.error(err);
        }
      }

      // mark an item active in the left list and update aria attributes
      function setActiveItem(item) {
        if (!item) return;
        const prev = document.querySelector('.contact-item.active');
        if (prev) {
          prev.classList.remove('active');
          prev.setAttribute('aria-pressed', 'false');
        }
        item.classList.add('active');
        item.setAttribute('aria-pressed', 'true');
        item.focus();
      }

      // simple banner/toast helper (non-blocking)
      function showBanner(message, type = 'info', timeout = 3500) {
        const banner = document.getElementById('app-banner');
        const msg = document.getElementById('app-banner-msg');
        const close = document.getElementById('app-banner-close');
        if (!banner || !msg) return;
        msg.textContent = message;
        // set colors by type
        if (type === 'success') {
          banner.style.background = '#E6FAE8';
          banner.style.color = '#0b6b2b';
        } else if (type === 'error') {
          banner.style.background = '#FFECEC';
          banner.style.color = '#8a1f1f';
        } else {
          banner.style.background = '#FFF7E6';
          banner.style.color = '#5a4300';
        }
        banner.style.display = 'block';
        // clear any existing timer
        if (banner._hideTimer) clearTimeout(banner._hideTimer);
        banner._hideTimer = setTimeout(() => {
          banner.style.display = 'none';
        }, timeout);
        close.onclick = function () {
          if (banner._hideTimer) clearTimeout(banner._hideTimer);
          banner.style.display = 'none';
        };
      }

      // custom confirm modal helper, returns a Promise<boolean>
      function showConfirmModal(
        message,
        confirmText = 'Delete',
        cancelText = 'Cancel',
      ) {
        return new Promise((resolve) => {
          const modal = document.getElementById('confirm-modal');
          const msg = document.getElementById('confirm-modal-msg');
          const btnConfirm = document.getElementById('confirm-modal-confirm');
          const btnCancel = document.getElementById('confirm-modal-cancel');
          if (!modal || !msg || !btnConfirm || !btnCancel)
            return resolve(false);
          msg.textContent = message;
          btnConfirm.textContent = confirmText;
          btnCancel.textContent = cancelText;
          modal.style.display = 'flex';

          const cleanup = () => {
            modal.style.display = 'none';
            btnConfirm.removeEventListener('click', onConfirm);
            btnCancel.removeEventListener('click', onCancel);
          };

          const onConfirm = () => {
            cleanup();
            resolve(true);
          };
          const onCancel = () => {
            cleanup();
            resolve(false);
          };

          btnConfirm.addEventListener('click', onConfirm);
          btnCancel.addEventListener('click', onCancel);
        });
      }

      document.addEventListener('DOMContentLoaded', () => {
        // helper to reindex method rows so input/select names match their order
        function reindexMethods() {
          const methods = document.getElementById('methods');
          if (!methods) return;
          const rows = methods.querySelectorAll('.method-row');
          rows.forEach((row, i) => {
            row.dataset.idx = i;
            const select = row.querySelector('select');
            const input = row.querySelector('input');
            if (select) select.name = `method_type_${i}`;
            if (input) input.name = `method_value_${i}`;
          });
        }

        // validation helper used by save and submit flows
        function validateForm(formEl) {
          // returns { valid: boolean, message: string|null }
          if (!formEl)
            return {
              valid: false,
              message:
                'Please enter first name, last name, and at least one contact method.',
            };
          const first = (
            formEl.querySelector('input[name="first_name"]')?.value || ''
          ).trim();
          const last = (
            formEl.querySelector('input[name="last_name"]')?.value || ''
          ).trim();
          const methodInputs = formEl.querySelectorAll(
            'input[name^="method_value_"]',
          );
          let hasMethod = false;
          methodInputs.forEach((mi) => {
            if ((mi.value || '').trim()) hasMethod = true;
          });

          // clear previous invalid markers
          formEl
            .querySelectorAll('.invalid')
            .forEach((el) => el.classList.remove('invalid'));

          let valid = true;
          if (!first) {
            const el = formEl.querySelector('input[name="first_name"]');
            if (el) el.classList.add('invalid');
            valid = false;
          }
          if (!last) {
            const el = formEl.querySelector('input[name="last_name"]');
            if (el) el.classList.add('invalid');
            valid = false;
          }
          if (!hasMethod) {
            const mi = formEl.querySelector('input[name^="method_value_"]');
            if (mi) mi.classList.add('invalid');
            valid = false;
          }
          // Check for duplicate email addresses within the form (per-contact constraint)
          if (valid) {
            const rows = formEl.querySelectorAll('.method-row');
            const seen = new Map();
            let duplicateFound = false;
            rows.forEach((row, idx) => {
              const select = row.querySelector('select');
              const input = row.querySelector('input');
              if (!select || !input) return;
              const type = (select.value || '').toLowerCase();
              const val = (input.value || '').trim();
              if (type === 'email' && val) {
                const norm = val.toLowerCase();
                if (seen.has(norm)) {
                  // mark both this and the first occurrence as invalid
                  const firstInput = seen.get(norm);
                  if (firstInput) firstInput.classList.add('invalid');
                  input.classList.add('invalid');
                  duplicateFound = true;
                  valid = false;
                } else {
                  seen.set(norm, input);
                }
              }
            });
            if (duplicateFound) {
              const firstInvalid = formEl.querySelector('.invalid');
              if (firstInvalid) firstInvalid.focus();
              return {
                valid: false,
                message:
                  'This is a duplicate contact method, please enter a unique contact method.',
              };
            }
          }
          if (!valid) {
            const firstInvalid = formEl.querySelector('.invalid');
            if (firstInvalid) firstInvalid.focus();
            return {
              valid: false,
              message:
                'Please enter first name, last name, and at least one contact method.',
            };
          }
          return { valid: true, message: null };
        }

        const list = document.getElementById('contact-list');

        list.addEventListener('click', (e) => {
          const item = e.target.closest('.contact-item');
          if (!item) return;
          const pk = item.dataset.pk;
          loadDetail(pk);
          setActiveItem(item);
        });

        // Handle header Add contact button locally (do NOT persist until Save)
        const createBtn = document.getElementById('create-contact');
        if (createBtn) {
          createBtn.addEventListener('click', (ev) => {
            ev.preventDefault();
            // create a local list item (no data-pk) and open blank detail form
            const ul = document.querySelector('#contact-list ul');
            if (!ul) return;
            const li = document.createElement('li');
            const div = document.createElement('div');
            div.className = 'contact-item';
            // mark as new (not yet persisted)
            div.dataset.new = 'true';
            div.setAttribute('role', 'button');
            div.setAttribute('tabindex', '0');
            div.setAttribute('aria-pressed', 'false');
            div.textContent = '';
            li.appendChild(div);
            ul.appendChild(li);

            // activate and render blank detail without saving to DB
            setActiveItem(div);
            renderDetail({
              first_name: '',
              last_name: '',
              contact_methods: [],
            });
          });
        }

        // handle form submit via delegation on the detail pane
        document.body.addEventListener('submit', async (e) => {
          if (e.target && e.target.id === 'contact-form') {
            e.preventDefault();
            const form = e.target;
            // ensure form is valid server-side before building payload
            const validation = validateForm(form);
            if (!validation.valid) {
              showBanner(
                validation.message ||
                  'Please enter first name, last name, and at least one contact method.',
                'error',
              );
              return;
            }
            const activeItem = document.querySelector('.contact-item.active');
            if (!activeItem) return;
            const pk = activeItem.dataset.pk;

            // build payload
            const formData = new FormData(form);
            const payload = {
              first_name: formData.get('first_name'),
              last_name: formData.get('last_name'),
              contact_methods: [],
            };

            // collect method rows
            const methodRows = form.querySelectorAll('.method-row');
            methodRows.forEach((row, idx) => {
              const type = formData.get(`method_type_${idx}`);
              const value = formData.get(`method_value_${idx}`);
              if (value && type) payload.contact_methods.push({ type, value });
            });

            // CSRF token helper is defined at top-level

            try {
              if (pk) {
                // existing contact -> update
                const res = await fetch(`/contacts/api/${pk}/update/`, {
                  method: 'POST',
                  headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': getCookie('csrftoken'),
                  },
                  body: JSON.stringify(payload),
                });
                if (!res.ok) {
                  const errJson = await res.json().catch(() => null);
                  throw new Error(
                    (errJson && errJson.error) || 'Failed to save',
                  );
                }
                const updated = await res.json();
                // re-render detail pane with updated data and confirm to the user
                showBanner('Contact updated successfully.', 'success');
                loadDetail(updated.id);
                // update the name in the list
                if (activeItem)
                  activeItem.textContent = `${updated.first_name} ${updated.last_name}`;
              } else {
                // new (not yet persisted) -> create
                const res = await fetch('/contacts/api/create/', {
                  method: 'POST',
                  headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': getCookie('csrftoken'),
                  },
                  body: JSON.stringify(payload),
                });
                if (!res.ok) {
                  const errJson = await res.json().catch(() => null);
                  throw new Error(
                    (errJson && errJson.error) || 'Failed to create',
                  );
                }
                const created = await res.json();
                // mark list item with real pk and update its display
                activeItem.dataset.pk = created.id;
                activeItem.removeAttribute('data-new');
                activeItem.textContent = `${created.first_name} ${created.last_name}`;
                // inform the user and load persisted detail
                showBanner('Contact saved successfully.', 'success');
                loadDetail(created.id);
              }
            } catch (err) {
              console.error(err);
              showBanner(err.message || 'Error saving contact', 'error');
            }
          }
        });

        // handle add-method, save-contact and delete-method clicks (works when clicking the image inside the anchor)
        document.body.addEventListener('click', async (e) => {
          const saveTrigger =
            e.target.closest && e.target.closest('#save-contact');
          if (saveTrigger) {
            e.preventDefault();
            const form = document.getElementById('contact-form');
            if (form) {
              // validate before submitting
              const validation = validateForm(form);
              if (!validation.valid) {
                showBanner(
                  validation.message ||
                    'Please enter first name, last name, and at least one contact method.',
                  'error',
                );
                return;
              }
              if (typeof form.requestSubmit === 'function') {
                form.requestSubmit();
              } else {
                form.dispatchEvent(
                  new Event('submit', { bubbles: true, cancelable: true }),
                );
              }
            }
            return;
          }

          // delete-method (click on the remove icon)

          const deleteTrigger =
            e.target.closest && e.target.closest('.delete-method');
          if (deleteTrigger) {
            e.preventDefault();
            // confirm deletion of a contact method with custom modal
            const methodConfirmed = await showConfirmModal(
              'Are you sure you want to delete this contact method? This action cannot be undone.',
              'Delete',
              'Cancel',
            );
            if (!methodConfirmed) return;
            const row = deleteTrigger.closest('.method-row');
            const methodId = deleteTrigger.dataset.methodId;
            if (methodId) {
              // request server delete
              try {
                const res = await fetch(
                  `/contacts/method/${methodId}/delete/`,
                  {
                    method: 'DELETE',
                    headers: {
                      'X-CSRFToken': getCookie('csrftoken'),
                    },
                  },
                );
                if (!res.ok) throw new Error('Delete failed');
                // removed on success
                if (row) {
                  row.remove();
                  reindexMethods();
                  showBanner('Contact method deleted.', 'success');
                }
              } catch (err) {
                console.error(err);
                showBanner('Failed to delete method', 'error');
              }
            } else {
              // not persisted yet; just remove locally
              if (row) {
                row.remove();
                reindexMethods();
                showBanner('Contact method removed.', 'success');
              }
            }
            return;
          }

          // delete-contact (click on the delete contact image in bottom-controls)
          const deleteContactTrigger =
            e.target.closest && e.target.closest('#delete-contact');
          if (deleteContactTrigger) {
            e.preventDefault();

            // ask user to confirm before deleting (use custom modal)
            const confirmed = await showConfirmModal(
              'Are you sure you want to delete this contact? This action cannot be undone.',
              'Delete',
              'Cancel',
            );
            if (!confirmed) {
              // user cancelled - do nothing
              return;
            }

            const activeItem = document.querySelector('.contact-item.active');
            if (!activeItem) return;
            const pk = activeItem.dataset.pk;
            const li = activeItem.closest('li');

            if (!pk) {
              // unsaved local item: just remove from DOM and clear detail
              if (li) li.remove();
              document.getElementById('contact-detail').innerHTML = '';
              // focus first existing contact if any
              const first = document.querySelector('.contact-item[data-pk]');
              if (first) {
                setActiveItem(first);
                loadDetail(first.dataset.pk);
              }
              return;
            }

            // persisted contact: request server delete
            try {
              const res = await fetch(`/contacts/api/${pk}/delete/`, {
                method: 'DELETE',
                headers: {
                  'X-CSRFToken': getCookie('csrftoken'),
                },
              });
              if (!res.ok) throw new Error('Delete failed');
              const json = await res.json();
              if (json.deleted) {
                if (li) li.remove();
                document.getElementById('contact-detail').innerHTML = '';
                // load next available contact
                const next = document.querySelector('.contact-item[data-pk]');
                if (next) {
                  setActiveItem(next);
                  loadDetail(next.dataset.pk);
                }
              }
            } catch (err) {
              console.error(err);
              showBanner('Failed to delete contact', 'error');
            }
            return;
          }

          // cancel-contact (revert edits or remove unsaved)
          const cancelTrigger =
            e.target.closest && e.target.closest('#cancel-contact');
          if (cancelTrigger) {
            e.preventDefault();
            const activeItem = document.querySelector('.contact-item.active');
            if (!activeItem) {
              document.getElementById('contact-detail').innerHTML = '';
              return;
            }
            const pk = activeItem.dataset.pk;
            const li = activeItem.closest('li');

            if (!pk) {
              // unsaved local item: remove it and clear detail
              if (li) li.remove();
              document.getElementById('contact-detail').innerHTML = '';
              // focus first existing persisted contact
              const first = document.querySelector('.contact-item[data-pk]');
              if (first) {
                setActiveItem(first);
                loadDetail(first.dataset.pk);
              }
              return;
            }

            // persisted contact: reload original data from server to discard local edits
            try {
              const data = await loadDetail(pk);
              if (data && activeItem) {
                activeItem.textContent = `${data.first_name} ${data.last_name}`;
              }
            } catch (err) {
              console.error(err);
              showBanner('Failed to revert changes', 'error');
            }
            return;
          }

          const addTrigger =
            e.target.closest && e.target.closest('#add-method');
          if (addTrigger) {
            e.preventDefault();
            const methods = document.getElementById('methods');
            const idx = methods.querySelectorAll('.method-row').length;
            const div = document.createElement('div');
            div.className = 'method-row';
            div.dataset.idx = idx;
            div.innerHTML = `\
              <select name="method_type_${idx}">\
                <option value="email">Email</option>\
                <option value="phone">Phone</option>\
                <option value="social">Social</option>\
              </select>\
              <input name="method_value_${idx}" value="" />\
              <a href="#" class="delete-method" aria-label="Remove method"><img src="{% static 'images/Group 3.png' %}" alt="Remove" /></a>`;
            methods.appendChild(div);
            // ensure names/indexes remain sequential
            reindexMethods();
          }
        });

        list.addEventListener('keydown', (e) => {
          const item = e.target.closest('.contact-item');
          if (!item) return;
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            const pk = item.dataset.pk;
            loadDetail(pk);
            setActiveItem(item);
          }
        });

        // initial load
        // If redirected from create, `?new=<id>` will be present. Load that contact.
        const params = new URLSearchParams(window.location.search);
        const newId = params.get('new');
        if (newId) {
          const newItem = document.querySelector(
            `.contact-item[data-pk="${newId}"]`,
          );
          if (newItem) {
            setActiveItem(newItem);
            loadDetail(newId);
          } else {
            // still attempt to load detail even if list item not found
            loadDetail(newId);
          }
          // remove query param to keep URL clean
          history.replaceState(null, '', window.location.pathname);
        } else {
          const first = document.querySelector('.contact-item');
          if (first) {
            loadDetail(first.dataset.pk);
            setActiveItem(first);
          }
        }
      });
    </script>
  </body>
</html>
