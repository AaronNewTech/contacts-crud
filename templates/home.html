<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>{% block title %}Contacts CRUD{% endblock title %}</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/home.css' %}" />
  </head>
  <body>
    <form id="csrf-form" class="hidden-csrf">{% csrf_token %}</form>
    <!-- confirm modal (custom) -->
    <div id="confirm-modal" role="dialog" aria-modal="true">
      <div class="confirm-dialog">
        <p id="confirm-modal-msg" class="confirm-msg"></p>
        <div class="confirm-actions">
          <button id="confirm-modal-cancel" class="confirm-cancel">
            Cancel
          </button>
          <button id="confirm-modal-confirm" class="confirm-confirm">
            Delete
          </button>
        </div>
      </div>
    </div>
    <div id="app-banner" aria-live="polite">
      <span id="app-banner-msg"></span>
      <button
        id="app-banner-close"
        aria-label="Dismiss"
        class="app-banner-close"
      >
        ✕
      </button>
    </div>

    <div class="layout">
      <div id="contact-list">
        <div class="header">
          <h1>Contacts</h1>

          <a id="create-contact" href="#" title="Add contact">
            <img src="{% static 'images/Group 1.png' %}" alt="Add contact" />
          </a>
        </div>
        <ul>
          {% for c in contacts %}
          <li>
            <div
              class="contact-item"
              data-pk="{{ c.pk }}"
              data-first="{{ c.first_name }}"
              data-last="{{ c.last_name }}"
              role="button"
              tabindex="0"
              aria-pressed="false"
            >
              {{ c.first_name }} {{ c.last_name }}
            </div>
          </li>
          {% empty %}
          <li>No contacts</li>
          {% endfor %}
        </ul>
      </div>

      <div id="contact-detail">
        <!-- detail will be loaded here -->
      </div>
    </div>

    <script>
      // helper to read cookies (used for CSRF token)
      function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
          const cookies = document.cookie.split(';');
          for (let i = 0; i < cookies.length; i++) {
            const cookie = cookies[i].trim();
            if (cookie.substring(0, name.length + 1) === name + '=') {
              cookieValue = decodeURIComponent(
                cookie.substring(name.length + 1),
              );
              break;
            }
          }
        }
        return cookieValue;
      }
      // Render detail HTML from a data object (used for server-fetched and local-new contacts)
      function renderDetail(data) {
        const detailEl = document.getElementById('contact-detail');
        let html = `
            <div class="contact-detail">
              <form id="contact-form">
                <h2>
                  <input  id="first-name" name="first_name" value="${data.first_name || ''}" placeholder="First name" />
                  <input id="last-name" name="last_name" value="${data.last_name || ''}" placeholder="Last name" />
                </h2>

                <h3>Contact methods</h3>
                <div id="methods">
              `;

        if (data.contact_methods && data.contact_methods.length) {
          data.contact_methods.forEach((m, idx) => {
            html +=
              `<div class="method-row" data-idx="${idx}">` +
              `<select name="method_type_${idx}">` +
              `<option value="email" ${m.type === 'email' ? 'selected' : ''}>Email</option>` +
              `<option value="phone" ${m.type === 'phone' ? 'selected' : ''}>Phone</option>` +
              `<option value="social" ${m.type === 'social' ? 'selected' : ''}>Social</option>` +
              `</select>` +
              `<input name="method_value_${idx}" value="${m.value || ''}" />` +
              `${m.id ? `<a href="#" class="delete-method" data-method-id="${m.id}" aria-label="Remove method"><img src="{% static 'images/Group 3.png' %}" alt="Remove" /></a>` : `<a href="#" class="delete-method" aria-label="Remove method"><img src="{% static 'images/Group 3.png' %}" alt="Remove" /></a>`}` +
              `</div>`;
          });
        } else {
          html +=
            `<div class="method-row" data-idx="0">` +
            `<select name="method_type_0">` +
            `<option value="email">Email</option>` +
            `<option value="phone">Phone</option>` +
            `<option value="social">Social</option>` +
            `</select>` +
            `<input name="method_value_0" value="" />` +
            `<a href="#" class="delete-method" aria-label="Remove method"><img src="{% static 'images/Group 3.png' %}" alt="Remove" /></a>` +
            `</div>`;
        }

        html += `</div>`;

        html += `
                <div class="method-controls">
                  <a id="add-method" href="#" role="button" class="image-button" aria-label="Add method">
                    <img src="{% static 'images/Group 2.png' %}" alt="Add method" />add method
                  </a>
                </div>
                <div class="bottom-controls">
                    <a id="delete-contact" href="#" role="button" class="image-button" aria-label="Delete contact">
                    <img src="{% static 'images/Component 3.png' %}" alt="Delete contact" />
                  </a>
                  <a id="cancel-contact" href="#" role="button" class="image-button" aria-label="Cancel contact">
                    <img src="{% static 'images/Component 2.png' %}" alt="Cancel contact" />
                  </a>

                  <a id="save-contact" href="#" role="button" class="image-button" aria-label="Save contact">
                    <img src="{% static 'images/Component 1.png' %}" alt="Save contact" />
                  </a>
                </div>
              </form>`;

        // Events (render only within the detail pane)
        html += `<h3>Events</h3><div id="events">`;
        if (data.events && data.events.length) {
          data.events.forEach((e) => {
            // include a machine-friendly data-start attribute for chronological ordering
            const startAttr = `${e.start_date}T${e.start_time}`;
            html +=
              `<div class="event-row" data-event-id="${e.id}" data-start="${startAttr}">` +
              `<div class="event-content">` +
              `<div class="event-text">` +
              `<div class="event-title">${e.name || ''}</div>` +
              `<div class="event-meta">${e.start_date} ${e.start_time} — ${e.end_date} ${e.end_time}</div>` +
              `</div>` +
              `<a href="#" class="delete-event" data-event-id="${e.id}" aria-label="Remove event"><img src="{% static 'images/Group 3.png' %}" alt="Remove" /></a>` +
              `</div>` +
              `</div>`;
          });
          html += `<a id="add-event" href="#" role="button" class="image-button" aria-label="Add event" title="Add event">
                    <img src="{% static 'images/Group 2.png' %}" alt="Add event"/>add event
                  </a>`;
        } else {
          html += `<div class="no-events">No events</div>
          <a id="add-event" href="#" role="button" class="image-button" aria-label="Add event" title="Add event">
                    <img src="{% static 'images/Group 2.png' %}" alt="Add event"/>add event
                  </a>`;
        }

        html += `</div>`;
        detailEl.innerHTML = html;
      }

      // Attach click handlers to load contact JSON and render it client-side
      async function loadDetail(pk) {
        const detailEl = document.getElementById('contact-detail');
        try {
          const res = await fetch(`/contacts/api/${pk}/`);
          if (!res.ok) throw new Error('Network response was not ok');
          const data = await res.json();
          renderDetail(data);
          return data;
        } catch (err) {
          detailEl.innerHTML = '<p>Error loading contact.</p>';
          console.error(err);
        }
      }

      // mark an item active in the left list and update aria attributes
      function setActiveItem(item) {
        if (!item) return;
        const prev = document.querySelector('.contact-item.active');
        if (prev) {
          prev.classList.remove('active');
          prev.setAttribute('aria-pressed', 'false');
        }
        item.classList.add('active');
        item.setAttribute('aria-pressed', 'true');
        item.focus();
      }

      // simple banner/toast helper (non-blocking)
      function showBanner(message, type = 'info', timeout = 3500) {
        const banner = document.getElementById('app-banner');
        const msg = document.getElementById('app-banner-msg');
        const close = document.getElementById('app-banner-close');
        if (!banner || !msg) return;
        msg.textContent = message;
        // set colors by type
        if (type === 'success') {
          banner.style.background = '#E6FAE8';
          banner.style.color = '#0b6b2b';
        } else if (type === 'error') {
          banner.style.background = '#FFECEC';
          banner.style.color = '#8a1f1f';
        } else {
          banner.style.background = '#FFF7E6';
          banner.style.color = '#5a4300';
        }
        banner.style.display = 'block';
        // clear any existing timer
        if (banner._hideTimer) clearTimeout(banner._hideTimer);
        banner._hideTimer = setTimeout(() => {
          banner.style.display = 'none';
        }, timeout);
        close.onclick = function () {
          if (banner._hideTimer) clearTimeout(banner._hideTimer);
          banner.style.display = 'none';
        };
      }

      // custom confirm modal helper, returns a Promise<boolean>
      function showConfirmModal(
        message,
        confirmText = 'Delete',
        cancelText = 'Cancel',
      ) {
        return new Promise((resolve) => {
          const modal = document.getElementById('confirm-modal');
          const msg = document.getElementById('confirm-modal-msg');
          const btnConfirm = document.getElementById('confirm-modal-confirm');
          const btnCancel = document.getElementById('confirm-modal-cancel');
          if (!modal || !msg || !btnConfirm || !btnCancel)
            return resolve(false);
          msg.textContent = message;
          btnConfirm.textContent = confirmText;
          btnCancel.textContent = cancelText;
          modal.style.display = 'flex';

          const cleanup = () => {
            modal.style.display = 'none';
            btnConfirm.removeEventListener('click', onConfirm);
            btnCancel.removeEventListener('click', onCancel);
          };

          const onConfirm = () => {
            cleanup();
            resolve(true);
          };
          const onCancel = () => {
            cleanup();
            resolve(false);
          };

          btnConfirm.addEventListener('click', onConfirm);
          btnCancel.addEventListener('click', onCancel);
        });
      }

      document.addEventListener('DOMContentLoaded', () => {
        // helper to reindex method rows so input/select names match their order
        function reindexMethods() {
          const methods = document.getElementById('methods');
          if (!methods) return;
          const rows = methods.querySelectorAll('.method-row');
          rows.forEach((row, i) => {
            row.dataset.idx = i;
            const select = row.querySelector('select');
            const input = row.querySelector('input');
            if (select) select.name = `method_type_${i}`;
            if (input) input.name = `method_value_${i}`;
          });
        }

        // Compare two names by last name then first name, case-insensitive.
        function compareNames(aFirst, aLast, bFirst, bLast) {
          const aL = (aLast || '').toLowerCase();
          const bL = (bLast || '').toLowerCase();
          if (aL < bL) return -1;
          if (aL > bL) return 1;
          const aF = (aFirst || '').toLowerCase();
          const bF = (bFirst || '').toLowerCase();
          if (aF < bF) return -1;
          if (aF > bF) return 1;
          return 0;
        }

        // Place a list item into the correct alphabetical position by name.
        function placeListItemByName(itemEl, firstName, lastName) {
          if (!itemEl) return;
          const ul = document.querySelector('#contact-list ul');
          if (!ul) return;
          const li = itemEl.closest('li') || document.createElement('li');
          // ensure the item is in a li we can move
          if (!itemEl.closest('li')) li.appendChild(itemEl);

          // Find the first existing persisted contact that should come after this one
          const items = Array.from(ul.querySelectorAll('.contact-item')).filter(
            (it) => it !== itemEl && it.dataset.pk,
          );
          let inserted = false;
          for (const other of items) {
            // Prefer structured data attributes (data-first, data-last). Fall back to parsing text.
            const oFirstName =
              other.dataset.first ||
              (() => {
                const text = (other.textContent || '').trim();
                const parts = text.split(/\s+/);
                return parts.slice(0, -1).join(' ');
              })();
            const oLastName =
              other.dataset.last ||
              (() => {
                const text = (other.textContent || '').trim();
                const parts = text.split(/\s+/);
                return parts.slice(-1)[0] || '';
              })();

            if (compareNames(firstName, lastName, oFirstName, oLastName) < 0) {
              // insert before other.parent li
              const otherLi = other.closest('li');
              if (otherLi) {
                ul.insertBefore(li, otherLi);
              } else {
                ul.insertBefore(li, other);
              }
              inserted = true;
              break;
            }
          }
          if (!inserted) {
            // append to end
            ul.appendChild(li);
          }
        }

        // validation helper used by save and submit flows
        function validateForm(formEl) {
          // returns { valid: boolean, message: string|null }
          if (!formEl)
            return {
              valid: false,
              message:
                'Please enter first name, last name, and at least one contact method.',
            };
          const first = (
            formEl.querySelector('input[name="first_name"]')?.value || ''
          ).trim();
          const last = (
            formEl.querySelector('input[name="last_name"]')?.value || ''
          ).trim();
          const methodInputs = formEl.querySelectorAll(
            'input[name^="method_value_"]',
          );
          let hasMethod = false;
          methodInputs.forEach((mi) => {
            if ((mi.value || '').trim()) hasMethod = true;
          });

          // clear previous invalid markers
          formEl
            .querySelectorAll('.invalid')
            .forEach((el) => el.classList.remove('invalid'));

          let valid = true;
          if (!first) {
            const el = formEl.querySelector('input[name="first_name"]');
            if (el) el.classList.add('invalid');
            valid = false;
          }
          if (!last) {
            const el = formEl.querySelector('input[name="last_name"]');
            if (el) el.classList.add('invalid');
            valid = false;
          }
          if (!hasMethod) {
            const mi = formEl.querySelector('input[name^="method_value_"]');
            if (mi) mi.classList.add('invalid');
            valid = false;
          }
          // helper: simple email format check (performs a reasonable client-side
          // check; server enforces canonical validation as well)
          function isValidEmailAddress(email) {
            // RFC 5322-ish liberal regex (not perfect but fine for client-side)
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
          }

          // Check for duplicate email addresses within the form (per-contact constraint)
          if (valid) {
            const rows = formEl.querySelectorAll('.method-row');
            const seen = new Map();
            let duplicateFound = false;
            let formatInvalid = false;
            rows.forEach((row, idx) => {
              const select = row.querySelector('select');
              const input = row.querySelector('input');
              if (!select || !input) return;
              const type = (select.value || '').toLowerCase();
              const val = (input.value || '').trim();
              // If this is an email, validate format first
              if (type === 'email' && val) {
                if (!isValidEmailAddress(val)) {
                  input.classList.add('invalid');
                  // focus the first invalid later; set flag
                  formatInvalid = true;
                  valid = false;
                }
              }
              if (type === 'email' && val) {
                const norm = val.toLowerCase();
                if (seen.has(norm)) {
                  // mark both this and the first occurrence as invalid
                  const firstInput = seen.get(norm);
                  if (firstInput) firstInput.classList.add('invalid');
                  input.classList.add('invalid');
                  duplicateFound = true;
                  valid = false;
                } else {
                  seen.set(norm, input);
                }
              }
            });
            if (formatInvalid) {
              const firstInvalid = formEl.querySelector('.invalid');
              if (firstInvalid) firstInvalid.focus();
              return {
                valid: false,
                message: 'Please enter a valid email address.',
              };
            }

            if (duplicateFound) {
              const firstInvalid = formEl.querySelector('.invalid');
              if (firstInvalid) firstInvalid.focus();
              return {
                valid: false,
                message:
                  'This is a duplicate contact method, please enter a unique contact method.',
              };
            }
          }
          if (!valid) {
            const firstInvalid = formEl.querySelector('.invalid');
            if (firstInvalid) firstInvalid.focus();
            return {
              valid: false,
              message:
                'Please enter first name, last name, and at least one contact method.',
            };
          }
          return { valid: true, message: null };
        }

        const list = document.getElementById('contact-list');

        list.addEventListener('click', (e) => {
          const item = e.target.closest('.contact-item');
          if (!item) return;
          const pk = item.dataset.pk;
          loadDetail(pk);
          setActiveItem(item);
        });

        // Handle header Add contact button locally (do NOT persist until Save)
        const createBtn = document.getElementById('create-contact');
        if (createBtn) {
          createBtn.addEventListener('click', (ev) => {
            ev.preventDefault();
            // create a local list item (no data-pk) and open blank detail form
            const ul = document.querySelector('#contact-list ul');
            if (!ul) return;
            const li = document.createElement('li');
            const div = document.createElement('div');
            div.className = 'contact-item';
            // mark as new (not yet persisted)
            div.dataset.new = 'true';
            div.setAttribute('role', 'button');
            div.setAttribute('tabindex', '0');
            div.setAttribute('aria-pressed', 'false');
            div.textContent = '';
            li.appendChild(div);
            ul.appendChild(li);

            // activate and render blank detail without saving to DB
            setActiveItem(div);
            renderDetail({
              first_name: '',
              last_name: '',
              contact_methods: [],
            });
          });
        }

        // handle form submit via delegation on the detail pane
        document.body.addEventListener('submit', async (e) => {
          if (e.target && e.target.id === 'contact-form') {
            e.preventDefault();
            const form = e.target;
            // ensure form is valid server-side before building payload
            const validation = validateForm(form);
            if (!validation.valid) {
              showBanner(
                validation.message ||
                  'Please enter first name, last name, and at least one contact method.',
                'error',
              );
              return;
            }
            const activeItem = document.querySelector('.contact-item.active');
            if (!activeItem) return;
            const pk = activeItem.dataset.pk;

            // build payload
            const formData = new FormData(form);
            const payload = {
              first_name: formData.get('first_name'),
              last_name: formData.get('last_name'),
              contact_methods: [],
            };

            // collect method rows
            const methodRows = form.querySelectorAll('.method-row');
            methodRows.forEach((row, idx) => {
              const type = formData.get(`method_type_${idx}`);
              const value = formData.get(`method_value_${idx}`);
              if (value && type) payload.contact_methods.push({ type, value });
            });

            // CSRF token helper is defined at top-level

            try {
              if (pk) {
                // existing contact -> update
                const res = await fetch(`/contacts/api/${pk}/update/`, {
                  method: 'POST',
                  headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': getCookie('csrftoken'),
                  },
                  body: JSON.stringify(payload),
                });
                if (!res.ok) {
                  const errJson = await res.json().catch(() => null);
                  throw new Error(
                    (errJson && errJson.error) || 'Failed to save',
                  );
                }
                const updated = await res.json();
                // re-render detail pane with updated data and confirm to the user
                showBanner('Contact updated successfully.', 'success');
                loadDetail(updated.id);
                // update the name in the list and reposition if needed
                if (activeItem) {
                  activeItem.dataset.first = updated.first_name;
                  activeItem.dataset.last = updated.last_name;
                  activeItem.textContent = `${updated.first_name} ${updated.last_name}`;
                  placeListItemByName(
                    activeItem,
                    updated.first_name,
                    updated.last_name,
                  );
                }
              } else {
                // new (not yet persisted) -> create
                const res = await fetch('/contacts/api/create/', {
                  method: 'POST',
                  headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': getCookie('csrftoken'),
                  },
                  body: JSON.stringify(payload),
                });
                if (!res.ok) {
                  const errJson = await res.json().catch(() => null);
                  throw new Error(
                    (errJson && errJson.error) || 'Failed to create',
                  );
                }
                const created = await res.json();
                // mark list item with real pk and update its display
                activeItem.dataset.pk = created.id;
                activeItem.removeAttribute('data-new');
                // store structured name data and update visible text
                activeItem.dataset.first = created.first_name;
                activeItem.dataset.last = created.last_name;
                activeItem.textContent = `${created.first_name} ${created.last_name}`;
                // insert the new item into the correct alphabetical position
                placeListItemByName(
                  activeItem,
                  created.first_name,
                  created.last_name,
                );
                // inform the user and load persisted detail
                showBanner('Contact saved successfully.', 'success');
                loadDetail(created.id);
              }
            } catch (err) {
              console.error(err);
              showBanner(err.message || 'Error saving contact', 'error');
            }
          }
        });

        // handle add-method, save-contact and delete-method clicks (works when clicking the image inside the anchor)
        document.body.addEventListener('click', async (e) => {
          // Add event: show inline event form
          const addEventTrigger =
            e.target.closest && e.target.closest('#add-event');
          if (addEventTrigger) {
            e.preventDefault();
            const events = document.getElementById('events');
            if (!events) return;
            // if a form already exists, don't add another
            if (document.getElementById('event-form')) return;
            const formHtml = `
              <div id="event-form" class="event-form">
                <input name="event_name" placeholder="Event name (optional)" />
                <div class="form-row">
                  <input type="date" name="start_date" />
                  <input type="time" name="start_time" />
                </div>
                <div class="form-row">
                  <input type="date" name="end_date" />
                  <input type="time" name="end_time" />
                </div>
                <div class="controls">
                  <a id="save-event" href="#" class="image-button"><img src="{% static 'images/Component 1.png' %}" alt="Save event" /></a>
                  <a id="cancel-event" href="#" class="image-button">Cancel</a>
                </div>
              </div>`;
            events.insertAdjacentHTML('afterbegin', formHtml);
            return;
          }

          // save event: submit inline form to create event
          const saveEventTrigger =
            e.target.closest && e.target.closest('#save-event');
          if (saveEventTrigger) {
            e.preventDefault();
            const form = document.getElementById('event-form');
            if (!form) return;
            const activeItem = document.querySelector('.contact-item.active');
            if (!activeItem || !activeItem.dataset.pk) {
              showBanner(
                'Please save or select a contact before adding events.',
                'error',
              );
              return;
            }
            const pk = activeItem.dataset.pk;
            const name = (
              form.querySelector('input[name="event_name"]').value || ''
            ).trim();
            const start_date = form.querySelector(
              'input[name="start_date"]',
            ).value;
            const start_time = form.querySelector(
              'input[name="start_time"]',
            ).value;
            const end_date = form.querySelector('input[name="end_date"]').value;
            const end_time = form.querySelector('input[name="end_time"]').value;
            if (!start_date || !start_time || !end_date || !end_time) {
              showBanner(
                'Please provide start and end date/time for the event.',
                'error',
              );
              return;
            }
            try {
              const res = await fetch(`/contacts/api/${pk}/events/create/`, {
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                  'X-CSRFToken': getCookie('csrftoken'),
                },
                body: JSON.stringify({
                  name,
                  start_date,
                  start_time,
                  end_date,
                  end_time,
                }),
              });
              if (!res.ok) {
                const err = await res.json().catch(() => ({}));
                throw new Error((err && err.error) || 'Failed to create event');
              }
              const created = await res.json();
              showBanner('Event created.', 'success');
              // remove the inline form
              const formEl = document.getElementById('event-form');
              if (formEl) formEl.remove();
              // insert the created event into the events list immediately
              const eventsContainer = document.getElementById('events');
              if (eventsContainer) {
                const row = document.createElement('div');
                row.className = 'event-row';
                row.dataset.eventId = created.id;
                // set data-start for ordering (ISO-like)
                row.dataset.start = `${created.start_date}T${created.start_time}`;
                row.innerHTML = `
                  <div class="event-content">
                    <div class="event-text">
                      <div class="event-title">${created.name || ''}</div>
                      <div class="event-meta">${created.start_date} ${created.start_time} — ${created.end_date} ${created.end_time}</div>
                    </div>
                    <a href="#" class="delete-event" data-event-id="${created.id}" aria-label="Remove event"><img src="{% static 'images/Group 3.png' %}" alt="Remove" /></a>
                  </div>`;
                // Insert in chronological order by start datetime. If an add button is present inside the container,
                // ensure we insert before it so events appear above the button.
                const newStart = new Date(row.dataset.start);
                let inserted = false;
                const existing = Array.from(
                  eventsContainer.querySelectorAll('.event-row'),
                );
                for (const other of existing) {
                  const ostart = other.dataset.start;
                  if (!ostart) continue;
                  const otherStart = new Date(ostart);
                  if (otherStart > newStart) {
                    eventsContainer.insertBefore(row, other);
                    inserted = true;
                    break;
                  }
                }
                if (!inserted) {
                  const addBtn = eventsContainer.querySelector('#add-event');
                  if (addBtn) {
                    eventsContainer.insertBefore(row, addBtn);
                  } else {
                    eventsContainer.appendChild(row);
                  }
                }
              }
            } catch (err) {
              console.error(err);
              showBanner(err.message || 'Failed to create event', 'error');
            }
            return;
          }

          // cancel-event: remove inline event form
          const cancelEventTrigger =
            e.target.closest && e.target.closest('#cancel-event');
          if (cancelEventTrigger) {
            e.preventDefault();
            const form = document.getElementById('event-form');
            if (form) form.remove();
            return;
          }

          const saveTrigger =
            e.target.closest && e.target.closest('#save-contact');
          if (saveTrigger) {
            e.preventDefault();
            const form = document.getElementById('contact-form');
            if (form) {
              // validate before submitting
              const validation = validateForm(form);
              if (!validation.valid) {
                showBanner(
                  validation.message ||
                    'Please enter first name, last name, and at least one contact method.',
                  'error',
                );
                return;
              }
              if (typeof form.requestSubmit === 'function') {
                form.requestSubmit();
              } else {
                form.dispatchEvent(
                  new Event('submit', { bubbles: true, cancelable: true }),
                );
              }
            }
            return;
          }

          // delete-method (click on the remove icon)

          const deleteTrigger =
            e.target.closest && e.target.closest('.delete-method');
          if (deleteTrigger) {
            e.preventDefault();
            // confirm deletion of a contact method with custom modal
            const methodConfirmed = await showConfirmModal(
              'Are you sure you want to delete this contact method? This action cannot be undone.',
              'Delete',
              'Cancel',
            );
            if (!methodConfirmed) return;
            const row = deleteTrigger.closest('.method-row');
            const methodId = deleteTrigger.dataset.methodId;
            if (methodId) {
              // request server delete
              try {
                const res = await fetch(
                  `/contacts/method/${methodId}/delete/`,
                  {
                    method: 'DELETE',
                    headers: {
                      'X-CSRFToken': getCookie('csrftoken'),
                    },
                  },
                );
                if (!res.ok) throw new Error('Delete failed');
                // removed on success
                if (row) {
                  row.remove();
                  reindexMethods();
                  showBanner('Contact method deleted.', 'success');
                }
              } catch (err) {
                console.error(err);
                showBanner('Failed to delete method', 'error');
              }
            } else {
              // not persisted yet; just remove locally
              if (row) {
                row.remove();
                reindexMethods();
                showBanner('Contact method removed.', 'success');
              }
            }
            return;
          }

          // delete-event (click on the remove icon for events)
          const deleteEventTrigger =
            e.target.closest && e.target.closest('.delete-event');
          if (deleteEventTrigger) {
            e.preventDefault();
            const confirmed = await showConfirmModal(
              'Are you sure you want to delete this event? This action cannot be undone.',
              'Delete',
              'Cancel',
            );
            if (!confirmed) return;
            const row = deleteEventTrigger.closest('.event-row');
            const eventId = deleteEventTrigger.dataset.eventId;
            if (eventId) {
              try {
                const res = await fetch(`/contacts/event/${eventId}/delete/`, {
                  method: 'DELETE',
                  headers: { 'X-CSRFToken': getCookie('csrftoken') },
                });
                if (!res.ok) throw new Error('Delete failed');
                const json = await res.json().catch(() => ({}));
                if (row) row.remove();
                showBanner('Event deleted.', 'success');
              } catch (err) {
                console.error(err);
                showBanner('Failed to delete event', 'error');
              }
            } else {
              // local only: remove from DOM
              if (row) row.remove();
              showBanner('Event removed.', 'success');
            }
            return;
          }

          // delete-contact (click on the delete contact image in bottom-controls)
          const deleteContactTrigger =
            e.target.closest && e.target.closest('#delete-contact');
          if (deleteContactTrigger) {
            e.preventDefault();

            // ask user to confirm before deleting (use custom modal)
            const confirmed = await showConfirmModal(
              'Are you sure you want to delete this contact? This action cannot be undone.',
              'Delete',
              'Cancel',
            );
            if (!confirmed) {
              // user cancelled - do nothing
              return;
            }

            const activeItem = document.querySelector('.contact-item.active');
            if (!activeItem) return;
            const pk = activeItem.dataset.pk;
            const li = activeItem.closest('li');

            if (!pk) {
              // unsaved local item: just remove from DOM and clear detail
              if (li) li.remove();
              document.getElementById('contact-detail').innerHTML = '';
              // focus first existing contact if any
              const first = document.querySelector('.contact-item[data-pk]');
              if (first) {
                setActiveItem(first);
                loadDetail(first.dataset.pk);
              }
              return;
            }

            // persisted contact: request server delete
            try {
              const res = await fetch(`/contacts/api/${pk}/delete/`, {
                method: 'DELETE',
                headers: {
                  'X-CSRFToken': getCookie('csrftoken'),
                },
              });
              if (!res.ok) throw new Error('Delete failed');
              const json = await res.json();
              if (json.deleted) {
                if (li) li.remove();
                document.getElementById('contact-detail').innerHTML = '';
                // load next available contact
                const next = document.querySelector('.contact-item[data-pk]');
                if (next) {
                  setActiveItem(next);
                  loadDetail(next.dataset.pk);
                }
              }
            } catch (err) {
              console.error(err);
              showBanner('Failed to delete contact', 'error');
            }
            return;
          }

          // cancel-contact (revert edits or remove unsaved)
          const cancelTrigger =
            e.target.closest && e.target.closest('#cancel-contact');
          if (cancelTrigger) {
            e.preventDefault();
            const activeItem = document.querySelector('.contact-item.active');
            if (!activeItem) {
              document.getElementById('contact-detail').innerHTML = '';
              return;
            }
            const pk = activeItem.dataset.pk;
            const li = activeItem.closest('li');

            if (!pk) {
              // unsaved local item: remove it and clear detail
              if (li) li.remove();
              document.getElementById('contact-detail').innerHTML = '';
              // focus first existing persisted contact
              const first = document.querySelector('.contact-item[data-pk]');
              if (first) {
                setActiveItem(first);
                loadDetail(first.dataset.pk);
              }
              return;
            }

            // persisted contact: reload original data from server to discard local edits
            try {
              const data = await loadDetail(pk);
              if (data && activeItem) {
                activeItem.textContent = `${data.first_name} ${data.last_name}`;
              }
            } catch (err) {
              console.error(err);
              showBanner('Failed to revert changes', 'error');
            }
            return;
          }

          const addTrigger =
            e.target.closest && e.target.closest('#add-method');
          if (addTrigger) {
            e.preventDefault();
            const methods = document.getElementById('methods');
            const idx = methods.querySelectorAll('.method-row').length;
            const div = document.createElement('div');
            div.className = 'method-row';
            div.dataset.idx = idx;
            div.innerHTML = `\
              <select name="method_type_${idx}">\
                <option value="email">Email</option>\
                <option value="phone">Phone</option>\
                <option value="social">Social</option>\
              </select>\
              <input name="method_value_${idx}" value="" />\
              <a href="#" class="delete-method" aria-label="Remove method"><img src="{% static 'images/Group 3.png' %}" alt="Remove" /></a>`;
            methods.appendChild(div);
            // ensure names/indexes remain sequential
            reindexMethods();
          }
        });

        list.addEventListener('keydown', (e) => {
          const item = e.target.closest('.contact-item');
          if (!item) return;
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            const pk = item.dataset.pk;
            loadDetail(pk);
            setActiveItem(item);
          }
        });

        // initial load
        // If redirected from create, `?new=<id>` will be present. Load that contact.
        const params = new URLSearchParams(window.location.search);
        const newId = params.get('new');
        if (newId) {
          const newItem = document.querySelector(
            `.contact-item[data-pk="${newId}"]`,
          );
          if (newItem) {
            setActiveItem(newItem);
            loadDetail(newId);
          } else {
            // still attempt to load detail even if list item not found
            loadDetail(newId);
          }
          // remove query param to keep URL clean
          history.replaceState(null, '', window.location.pathname);
        } else {
          const first = document.querySelector('.contact-item');
          if (first) {
            loadDetail(first.dataset.pk);
            setActiveItem(first);
          }
        }
      });
    </script>
  </body>
</html>
